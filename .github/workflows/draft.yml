name: Draft - YouTube検索 → Slack送信

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 07:00 JST (22:00 UTC)
  workflow_dispatch:        # 手動実行も可能

env:
  TZ: Asia/Tokyo

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # pending_posts.json をコミットするため

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: draft 実行（YouTube検索 → Slack送信）
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python main.py --mode draft

      - name: pending_posts.json をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pending_posts.json
          git diff --staged --quiet || git commit -m "chore: update pending_posts [skip ci]"
          git push
